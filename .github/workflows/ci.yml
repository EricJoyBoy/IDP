name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  AWS_REGION: eu-west-1
  JAVA_VERSION: "17"
  NODE_VERSION: "18"

jobs:
  # -----------------------------------------------------------------------
  # Build & Unit Tests — runs on every push / PR
  # -----------------------------------------------------------------------
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: corretto
          cache: maven

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: idp-frontend/src/main/angular/package-lock.json

      - name: Maven build & unit tests
        run: mvn -f idp-parent/pom.xml clean verify -B

      - name: Angular install & unit tests
        working-directory: idp-frontend/src/main/angular
        run: |
          npm ci
          npm test -- --watch=false --browsers=ChromeHeadless

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml

  # -----------------------------------------------------------------------
  # Trigger CodePipeline on merge to main
  # -----------------------------------------------------------------------
  trigger-codepipeline:
    name: Trigger CodePipeline
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start CodePipeline execution
        run: |
          aws codepipeline start-pipeline-execution \
            --name "${{ secrets.CODEPIPELINE_NAME }}" \
            --region "${{ env.AWS_REGION }}"
